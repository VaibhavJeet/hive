<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Community Companions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            color: #fff;
        }

        .status {
            display: flex;
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
        }

        .status-dot.error {
            background: #f87171;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
        }

        .stat-card h3 {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 600;
            color: #fff;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.1rem;
        }

        .panel-content {
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .bot-card {
            background: #252525;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .bot-card:hover {
            background: #303030;
        }

        .bot-card.selected {
            background: #2563eb;
        }

        .bot-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .bot-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .bot-info h4 {
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .bot-info .handle {
            font-size: 0.85rem;
            color: #888;
        }

        .bot-badge {
            font-size: 0.75rem;
            background: #374151;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: auto;
        }

        .bot-bio {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .bot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 0.75rem;
            background: #333;
            padding: 4px 10px;
            border-radius: 15px;
            color: #ccc;
        }

        .tag.mood {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .tag.energy {
            background: #1e3a2f;
            color: #4ade80;
        }

        /* Chat Panel */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.bot {
            align-items: flex-start;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.user .message-content {
            background: #2563eb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: #333;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
            padding: 0 5px;
        }

        .chat-input-container {
            padding: 15px;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            border-radius: 25px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input:focus {
            border-color: #2563eb;
        }

        .send-btn {
            background: #2563eb;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #1d4ed8;
        }

        .send-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .send-btn svg {
            fill: #fff;
            width: 20px;
            height: 20px;
        }

        .typing-indicator {
            display: none;
            padding: 10px 15px;
            color: #888;
            font-size: 0.85rem;
        }

        .typing-indicator.active {
            display: block;
        }

        .btn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .community-select {
            background: #252525;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Community Companions</h1>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot" id="api-status"></div>
                    <span>API</span>
                </div>
                <div class="status-item">
                    <div class="status-dot" id="llm-status"></div>
                    <span>LLM</span>
                </div>
                <div class="status-item">
                    <div class="status-dot" id="db-status"></div>
                    <span>Database</span>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Communities</h3>
                <div class="value" id="stat-communities">-</div>
            </div>
            <div class="stat-card">
                <h3>Active Bots</h3>
                <div class="value" id="stat-bots">-</div>
            </div>
            <div class="stat-card">
                <h3>LLM Requests</h3>
                <div class="value" id="stat-requests">-</div>
            </div>
            <div class="stat-card">
                <h3>Cache Hit Rate</h3>
                <div class="value" id="stat-cache">-</div>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="btn" id="init-btn" onclick="initializePlatform()">
                Initialize Platform (Create 2 Communities)
            </button>
        </div>

        <div class="main-grid">
            <div class="panel">
                <div class="panel-header">
                    <h2>AI Companions</h2>
                    <select class="community-select" id="community-select" onchange="loadBots()">
                        <option value="">Select Community</option>
                    </select>
                </div>
                <div class="panel-content" id="bots-list">
                    <div class="empty-state">
                        Select a community or initialize the platform
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2>Chat</h2>
                    <span id="chat-with" style="color: #888; font-size: 0.9rem;"></span>
                </div>
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <div class="empty-state">
                            Select a bot to start chatting
                        </div>
                    </div>
                    <div class="typing-indicator" id="typing-indicator">
                        Bot is typing...
                    </div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chat-input"
                               placeholder="Type a message..."
                               onkeypress="handleKeyPress(event)" disabled>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let selectedBot = null;
        let communities = [];
        let conversationId = 'web-' + Date.now();

        // Check health on load
        async function checkHealth() {
            try {
                const response = await fetch(`${API_URL}/health/detailed`);
                const data = await response.json();

                document.getElementById('api-status').className =
                    'status-dot ' + (data.status === 'healthy' ? '' : 'error');
                document.getElementById('llm-status').className =
                    'status-dot ' + (data.components?.llm === 'healthy' ? '' : 'error');
                document.getElementById('db-status').className =
                    'status-dot ' + (data.components?.database === 'healthy' ? '' : 'error');

                loadStats();
            } catch (e) {
                document.getElementById('api-status').className = 'status-dot error';
                document.getElementById('llm-status').className = 'status-dot error';
                document.getElementById('db-status').className = 'status-dot error';
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/platform/stats`);
                const data = await response.json();

                document.getElementById('stat-communities').textContent = data.total_communities || 0;
                document.getElementById('stat-bots').textContent = data.active_bots || 0;
                document.getElementById('stat-requests').textContent = data.llm_stats?.total_requests || 0;

                const hitRate = data.llm_stats?.hit_rate;
                document.getElementById('stat-cache').textContent =
                    hitRate !== undefined ? (hitRate * 100).toFixed(1) + '%' : '-';

                // Load communities
                if (data.total_communities > 0) {
                    loadCommunities();
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        async function loadCommunities() {
            try {
                const response = await fetch(`${API_URL}/platform/stats`);
                const data = await response.json();

                // We need an endpoint to list communities - for now use the initialize response
                // This is a workaround
            } catch (e) {
                console.error('Failed to load communities:', e);
            }
        }

        async function initializePlatform() {
            const btn = document.getElementById('init-btn');
            btn.disabled = true;
            btn.textContent = 'Initializing...';

            try {
                const response = await fetch(`${API_URL}/platform/initialize?num_communities=2`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.communities) {
                    communities = data.communities;
                    updateCommunitySelect();
                    loadStats();
                }

                btn.textContent = 'Platform Initialized!';
                setTimeout(() => {
                    btn.textContent = 'Initialize Platform (Create 2 Communities)';
                    btn.disabled = false;
                }, 2000);
            } catch (e) {
                console.error('Failed to initialize:', e);
                btn.textContent = 'Error - Try Again';
                btn.disabled = false;
            }
        }

        function updateCommunitySelect() {
            const select = document.getElementById('community-select');
            select.innerHTML = '<option value="">Select Community</option>';

            communities.forEach(comm => {
                const option = document.createElement('option');
                option.value = comm.id;
                option.textContent = `${comm.name} (${comm.bots} bots)`;
                select.appendChild(option);
            });
        }

        async function loadBots() {
            const select = document.getElementById('community-select');
            const communityId = select.value;

            if (!communityId) {
                document.getElementById('bots-list').innerHTML =
                    '<div class="empty-state">Select a community</div>';
                return;
            }

            document.getElementById('bots-list').innerHTML =
                '<div class="loading">Loading bots...</div>';

            try {
                const response = await fetch(`${API_URL}/communities/${communityId}/bots?limit=20`);
                const bots = await response.json();

                if (bots.length === 0) {
                    document.getElementById('bots-list').innerHTML =
                        '<div class="empty-state">No bots in this community</div>';
                    return;
                }

                document.getElementById('bots-list').innerHTML = bots.map(bot => `
                    <div class="bot-card" onclick="selectBot('${bot.id}', '${bot.display_name.replace(/'/g, "\\'")}')">
                        <div class="bot-header">
                            <div class="bot-avatar">${bot.display_name.charAt(0)}</div>
                            <div class="bot-info">
                                <h4>${bot.display_name}</h4>
                                <div class="handle">${bot.handle}</div>
                            </div>
                            <div class="bot-badge">${bot.ai_label_text}</div>
                        </div>
                        <div class="bot-bio">${bot.bio}</div>
                        <div class="bot-tags">
                            <span class="tag mood">${bot.mood}</span>
                            <span class="tag energy">${bot.energy}</span>
                            ${bot.interests.slice(0, 3).map(i => `<span class="tag">${i}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load bots:', e);
                document.getElementById('bots-list').innerHTML =
                    '<div class="empty-state">Failed to load bots</div>';
            }
        }

        function selectBot(botId, botName) {
            selectedBot = { id: botId, name: botName };

            // Update UI
            document.querySelectorAll('.bot-card').forEach(card => {
                card.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');

            document.getElementById('chat-with').textContent = `Chatting with ${botName}`;
            document.getElementById('chat-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('chat-messages').innerHTML = '';

            // Reset conversation
            conversationId = 'web-' + Date.now();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message || !selectedBot) return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            document.getElementById('typing-indicator').classList.add('active');
            document.getElementById('send-btn').disabled = true;

            try {
                const response = await fetch(`${API_URL}/bots/${selectedBot.id}/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bot_id: selectedBot.id,
                        conversation_id: conversationId,
                        content: message,
                        is_direct_message: true
                    })
                });

                const data = await response.json();

                // Hide typing indicator
                document.getElementById('typing-indicator').classList.remove('active');

                // Add bot response
                addMessage(data.text, 'bot', {
                    mood: data.emotional_state?.mood,
                    delay: data.response_delay_ms
                });

            } catch (e) {
                console.error('Failed to send message:', e);
                document.getElementById('typing-indicator').classList.remove('active');
                addMessage('Error: Failed to get response', 'bot');
            }

            document.getElementById('send-btn').disabled = false;
        }

        function addMessage(text, type, meta = {}) {
            const container = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            let metaText = '';
            if (meta.mood) metaText += `Mood: ${meta.mood}`;
            if (meta.delay) metaText += ` | Response: ${(meta.delay/1000).toFixed(1)}s`;

            messageDiv.innerHTML = `
                <div class="message-content">${text}</div>
                ${metaText ? `<div class="message-meta">${metaText}</div>` : ''}
            `;

            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Initialize
        checkHealth();
        setInterval(checkHealth, 30000); // Check every 30s
    </script>
</body>
</html>
