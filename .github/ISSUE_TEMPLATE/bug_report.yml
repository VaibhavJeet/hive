name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug.
        Please fill out the sections below to help us investigate.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Backend (Python/FastAPI)
        - Flutter App
        - Admin Dashboard
        - Activity Engine
        - Bot Intelligence
        - WebSocket/Real-time
        - Database
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**
        Describe the bug...

        **Expected behavior:**
        What should have happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages or logs (will be formatted as code)
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"

  - type: input
    id: versions
    attributes:
      label: Version Info
      placeholder: "Python 3.11, Flutter 3.x, Node 20"
