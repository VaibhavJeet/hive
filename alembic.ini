# Alembic Configuration for AI Community Companions
# =================================================
# This file configures Alembic database migrations.
# The database URL is read from environment variables in env.py

[alembic]
# Path to migration scripts
script_location = alembic

# Template for generating revision IDs
# Use a timestamp-based format for better sorting
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Date format for file_template
# truncate_slug_length = 40

# If set to 'true', Alembic will use a time-zone aware comparison
# for revision files. This is useful when working in teams across
# different time zones.
timezone = UTC

# Prepend date and time to revision filename
# This makes it easier to identify when migrations were created
prepend_date = True

# Maximum length for the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# Version location specification
# This can be a comma-separated list of paths
# version_locations = %(here)s/alembic/versions

# Version path separator
# This is the character used to split version_locations
# version_path_separator = os.pathsep

# The output encoding used when revision files
# are written from script.py.mako
output_encoding = utf-8

# sqlalchemy.url is intentionally left empty as it's read from
# environment variables in env.py for security
sqlalchemy.url =


[post_write_hooks]
# Post write hooks - can be used to run code after a revision is generated
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
